<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💣 Minesweeper — Schatzinsel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a1628; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
h1 { font-size: 1.3rem; color: #4fc3f7; margin-bottom: 4px; }
.sub { font-size: 0.8rem; color: #78909c; margin-bottom: 16px; }
.info { display: flex; gap: 20px; margin-bottom: 12px; font-size: 0.9rem; }
.grid { display: inline-grid; gap: 2px; background: #1e3050; padding: 4px; border-radius: 8px; }
.cell { width: 36px; height: 36px; background: #243554; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; user-select: none; transition: background 0.1s; border: 2px solid #2a3f60; }
.cell:hover { background: #2a4570; }
.cell.revealed { background: #0e1e30; border-color: #1e3555; cursor: default; }
.cell.mine { background: #3a1515; }
.cell.flagged { background: #1e3050; }
.n1 { color: #4fc3f7; } .n2 { color: #66bb6a; } .n3 { color: #ef5350; }
.n4 { color: #ab47bc; } .n5 { color: #ff7043; } .n6 { color: #26c6da; }
.n7 { color: #fff; } .n8 { color: #78909c; }
.msg { font-size: 1.2rem; margin-top: 16px; min-height: 30px; }
button { background: #132033; border: 1px solid #2a3f60; color: #90caf9; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-top: 12px; }
button:hover { background: #1e3050; border-color: #4fc3f7; }
</style>
</head>
<body>
<h1>💣 Minesweeper</h1>
<div class="sub">Finde alle Bomben auf der Schatzinsel!</div>
<div class="info">
  <span>💣 <span id="mines-left">10</span></span>
  <span>⏱️ <span id="timer">0</span>s</span>
</div>
<div class="grid" id="grid"></div>
<div class="msg" id="msg"></div>
<button onclick="newGame()">🔄 Nochmal</button>

<script>
const ROWS = 9, COLS = 9, MINES = 10;
let board, revealed, flagged, gameOver, startTime, timerInterval;

function newGame() {
  gameOver = false;
  document.getElementById('msg').textContent = '';
  document.getElementById('mines-left').textContent = MINES;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '0';
  startTime = null;

  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
  flagged = Array.from({length: ROWS}, () => Array(COLS).fill(false));

  // Place mines
  let placed = 0;
  while (placed < MINES) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (board[r][c] !== -1) { board[r][c] = -1; placed++; }
  }

  // Count neighbors
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        const nr = r+dr, nc = c+dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
      }
      board[r][c] = count;
    }
  }
  render();
}

function render() {
  const g = document.getElementById('grid');
  g.style.gridTemplateColumns = `repeat(${COLS}, 36px)`;
  g.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      if (revealed[r][c]) {
        cell.classList.add('revealed');
        if (board[r][c] === -1) { cell.classList.add('mine'); cell.textContent = '💣'; }
        else if (board[r][c] > 0) { cell.textContent = board[r][c]; cell.classList.add('n' + board[r][c]); }
      } else if (flagged[r][c]) {
        cell.classList.add('flagged');
        cell.textContent = '🚩';
      }
      cell.addEventListener('click', () => reveal(r, c));
      cell.addEventListener('contextmenu', (e) => { e.preventDefault(); flag(r, c); });
      // Long-press for mobile flag
      let pressTimer;
      cell.addEventListener('touchstart', (e) => { pressTimer = setTimeout(() => { e.preventDefault(); flag(r, c); }, 400); });
      cell.addEventListener('touchend', () => clearTimeout(pressTimer));
      g.appendChild(cell);
    }
  }
}

function reveal(r, c) {
  if (gameOver || revealed[r][c] || flagged[r][c]) return;
  if (!startTime) { startTime = Date.now(); timerInterval = setInterval(() => { document.getElementById('timer').textContent = Math.floor((Date.now()-startTime)/1000); }, 1000); }
  revealed[r][c] = true;
  if (board[r][c] === -1) { gameOver = true; revealAll(); document.getElementById('msg').textContent = '💥 BUMM! Bombe gefunden!'; clearInterval(timerInterval); render(); return; }
  if (board[r][c] === 0) { for (let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) { const nr=r+dr,nc=c+dc; if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS) reveal(nr,nc); } }
  render();
  checkWin();
}

function flag(r, c) {
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  const flags = flagged.flat().filter(Boolean).length;
  document.getElementById('mines-left').textContent = MINES - flags;
  render();
}

function revealAll() { for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(board[r][c]===-1) revealed[r][c]=true; }

function checkWin() {
  let unrevealed = 0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(!revealed[r][c]) unrevealed++;
  if (unrevealed === MINES) { gameOver = true; clearInterval(timerInterval); document.getElementById('msg').textContent = '🏆 GEWONNEN! Alle Bomben gefunden!'; }
}

newGame();
</script>
</body>
</html>
