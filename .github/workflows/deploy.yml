name: Check & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: JS Syntax-Check
        run: |
          FAIL=0
          SKIP="worker.js gemini-voice-worker.js playwright.config.js"
          for f in src/core/*.js src/world/*.js src/infra/*.js sw.js; do
            BASE=$(basename "$f")
            echo "$SKIP" | grep -qw "$BASE" && continue
            if ! node -c "$f" 2>&1; then
              FAIL=1
            fi
          done
          exit $FAIL

      - name: TypeScript Type-Check
        run: |
          npm install typescript --no-save
          npx tsc --noEmit

      - name: Smoke-Test (Playwright)
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npx playwright test --config=ops/tests/playwright.config.js --project=chromium --reporter=line

  deploy:
    name: Deploy
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version berechnen und stempeln
        id: version
        run: |
          # Commit-Count (monoton steigend, auch fuer SW Cache-Version)
          COUNT=$(git rev-list --count HEAD)
          # SemVer aus Tags oder Fallback
          if git describe --tags --match 'v*' HEAD 2>/dev/null; then
            VERSION=$(git describe --tags --match 'v*' HEAD)
          else
            # Kein Tag: v0.COMMIT_COUNT.SHORT_SHA
            SHA=$(git rev-parse --short HEAD)
            VERSION="v0.${COUNT}.${SHA}"
          fi
          DATE=$(date -u +%Y-%m-%d)
          STAMP="${VERSION} (${DATE})"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "stamp=${STAMP}" >> "$GITHUB_OUTPUT"
          echo "Version: ${STAMP}"

          # Stempel in index.html einsetzen
          sed -i "s|<!--VERSION-->.*<!--/VERSION-->|<!--VERSION-->${STAMP}<!--/VERSION-->|g" index.html

          # SW Cache-Version = Commit-Count (steigt monoton bei jedem Deploy)
          sed -i "s|const CACHE_VERSION = [0-9]*;|const CACHE_VERSION = ${COUNT};|g" sw.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-itch:
    name: Deploy to itch.io
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version stempeln
        id: version
        run: |
          COUNT=$(git rev-list --count HEAD)
          if git describe --tags --match 'v*' HEAD 2>/dev/null; then
            VERSION=$(git describe --tags --match 'v*' HEAD)
          else
            SHA=$(git rev-parse --short HEAD)
            VERSION="v0.${COUNT}.${SHA}"
          fi
          DATE=$(date -u +%Y-%m-%d)
          STAMP="${VERSION} (${DATE})"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          sed -i "s|<!--VERSION-->.*<!--/VERSION-->|<!--VERSION-->${STAMP}<!--/VERSION-->|g" index.html
          sed -i "s|const CACHE_VERSION = [0-9]*;|const CACHE_VERSION = ${COUNT};|g" sw.js

      - name: Build itch.io bundle
        run: |
          mkdir -p _itchio
          cp index.html style.css sw.js manifest.json _itchio/
          cp -r src/ _itchio/src/

      - name: Deploy to itch.io via Butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler push _itchio crygonejim/schatzinsel-treasure-island-le-des-merveilles:web --userversion "${{ steps.version.outputs.version }}"
        env:
          BUTLER_API_KEY: ${{ secrets.itch_io_butler }}
